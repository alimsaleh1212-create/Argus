# Sentinel evaluation thresholds — seeded day 1 per constitution Principle II.
# The full eval harness and remaining gates are added by SPEC-eval (#13).
# This file is extended (never replaced) by later components.

version: "1"

gates:
  smoke:
    description: >
      Provider-agnostic stack smoke gate: `docker compose up` from a fresh clone
      reaches all-services-healthy and `/ready` returns 200 within the grace window.
      Wired as a required CI check from day 1.
    required: true
    # No LLM provider dimension here — the smoke check is infrastructure-only.
    threshold:
      max_unhealthy_services: 0
      ready_within_seconds: 60

  redaction:
    description: >
      Redaction safety gate (SPEC-observability #2, seeded here; harness owned by SPEC-eval #13).
      Drives a synthetic incident through the unified observability seam with payloads
      seeded with fake credentials (AWS key, bearer token, PEM block) and fake PII
      (email, credit card, IP address).  Captures output at every boundary (log lines,
      trace span attributes, model-prompt assembly, stored snapshots, dashboard-facing
      views).  The gate passes only when ZERO seeded sensitive values appear unredacted
      anywhere in the captured output.  Credentials must also be absent from the
      operational incident object and the memory-store snapshot (FR-006a).
      Required in CI from day one; full harness wired by SPEC-eval (#13).
    required: true
    threshold:
      max_credential_leaks: 0
      max_pii_leaks: 0
      boundaries_checked:
        - log
        - trace
        - prompt
        - snapshot
        - dashboard
        - memory_write
        - operational
      seeded_credentials:
        - type: aws_key
          pattern: "AKIA[0-9A-Z]{16}"
        - type: bearer_token
          pattern: "Bearer eyJ[A-Za-z0-9._-]+"
        - type: pem_block
          pattern: "BEGIN RSA PRIVATE KEY"
      seeded_pii:
        - type: email
          example: "alice@example.com"
        - type: credit_card
          example: "4111111111111111"

  # Updated by SPEC-ingestion (#4): smoke gate now includes redis + worker services;
  # redaction gate is exercised through the POST /ingest/wazuh path (alert payloads
  # with planted secrets). No new gate is invented — triage/routing/retrieval gates
  # land with their own components.

  supervisor_routing:
    description: >
      Deterministic supervisor-routing gate (SPEC-incident-state-machine #7).
      Runs a labeled fixture set of grounded incidents through the supervisor with
      scripted stage fakes and asserts each incident reaches the expected next stage
      or terminal disposition. 100% pass required — the routing is deterministic,
      so anything below 1.0 is a regression. Provider-independent (no LLM call).
      Unit-tier (no DB). CI gate alongside smoke and redaction.
    required: true
    threshold:
      pass_rate: 1.0
    fixtures:
      - noise_low
      - critical_high
      - ambiguous_resolved_at_triage
      - ambiguous_full_depth
      - destructive_parks
      - indeterminate_severity
      - stage_error_escalates
      - cap_breach_escalates
      # Added by SPEC-response-remediation (#10): response disposition fixtures
      - auto_remediated
      - needs_approval_parks
      - approved_and_remediated
      - rejected_by_human
      - approval_expired
      # Added by SPEC-remediation-verification (#15): new FSM edge (RESPONDING, UNVERIFIED)
      - verified_resolves
      - unverified_escalates
      # Added by SPEC-memory-feedback-loop (#16): prior failure routes through existing severity→route path
      - prior_regressed_escalates

  llm_provider:
    description: >
      Both-providers gate (SPEC-llm-provider #3, seeded here; full harness owned by SPEC-eval #13).
      Runs a minimal generate-and-validate check against each configured provider (Gemini and Ollama)
      independently. A regression on either provider fails CI. Validates:
      - The provider returns a non-empty LlmResponse via the uniform seam.
      - Usage is present or correctly rendered as None ("unknown").
      - served_by_fallback reflects the configured primary correctly.
      Required in CI; full harness wired by SPEC-eval (#13).
    required: true
    providers:
      - gemini
      - ollama
    threshold:
      max_provider_failures: 0
      min_content_length: 1
      max_credential_leaks: 0
      check_per_provider: true

  triage:
    description: >
      Triage real-vs-noise gate (SPEC-triage-agent #8). Runs the committed labeled alert set through
      the triage handler and scores macro-F1 on the real/noise decision. Abstentions (uncertain) are
      reported and bounded, not scored as errors. MUST pass on BOTH configured providers (Gemini and
      Ollama) — the first eval gate with an LLM dimension. Full harness owned by SPEC-eval (#13);
      seeded here so CI gates from this component.
    required: true
    providers:
      - gemini
      - ollama
    threshold:
      min_macro_f1: 0.75
      max_abstention_rate: 0.30
      check_per_provider: true

  retrieval:
    description: >
      Similar-incident retrieval gate (SPEC-memory #6) extended with corpus fixtures
      (SPEC-knowledge-corpus #8). Pre-seeds the memory store with labeled prior incidents
      (tests/fixtures/memory_retrieval/priors.json), issues held-out queries and checks
      labeled priors surface within top-k. Also scores a corpus fixture set
      (tests/fixtures/corpus_retrieval/queries.json) for cold-start competence:
      technique-keyed and tag/lexical queries against a freshly seeded reference_corpus.
      Store-logic gate — provider-independent (deterministic keyed/lexical retrieval, no LLM).
      Cold-start queries returning [] are excluded from scoring. Full harness owned by SPEC-eval (#13).
    required: true
    threshold:
      min_hit_at_k: 0.80
      k: 5
      min_mrr: 0.60
    corpus_fixtures:
      fixture_dir: tests/fixtures/corpus_retrieval
      queries_file: queries.json
      min_hit_at_k: 1.0
      k: 5
    enrichment_fixtures:
      fixture_dir: tests/fixtures/enrichment
      cases_file: cases.json
      min_hit_at_k: 0.80
      k: 5

  temporal_memory:
    description: >
      Temporal-validity gate (SPEC-memory #6) — the Graphiti differentiator. Records a fact as
      benign at t1, a conflicting fact as malicious at t2, then asserts query_fact(as_of=t1)=benign
      (superseded), query_fact(now)=malicious (current), and the benign fact is RETAINED
      (invalidated, not deleted). 100% required — this is store logic, not a probabilistic judgment.
      Provider-independent. Fixtures in tests/fixtures/memory_temporal/scenarios.json.
    required: true
    threshold:
      pass_rate: 1.0
      cases:
        - reputation_flip
        - host_role_change
        - no_destructive_delete
        - verification_superseded_absent
        # Added by SPEC-memory-feedback-loop (#16)
        - remediation_outcome_flip

  rationale:
    description: >
      LLM-judge rationale-quality gate (SPEC-eval #13). A single pinned judge (the cloud primary)
      scores triage/enrichment/response rationales on an ordinal scale (grounded / partially_grounded /
      ungrounded) plus a 'cites only supplied evidence' check. The judge is first validated against a
      small hand-labeled reference set (tests/fixtures/rationale/{stage}.json); per-stage grounded-rate
      and judge↔human agreement are RECORDED in eval_report.json. REPORTED-ONLY: ordinary below-target
      scores do NOT block merge — only the catastrophic_floor does. Freeze/nightly only; judge pinned
      regardless of which provider produced the rationale.
    required: false          # reported-only — harness maps this to kind=reported_only
    run_modes: [freeze, nightly]
    judge_provider: gemini   # pinned (R6); informational — authoritative value is EvalSettings.judge_provider
    stages: [triage, enrichment, response]
    fixture_dir: tests/fixtures/rationale
    target:                  # reported, NOT blocking
      min_grounded_rate: 0.70
      min_judge_agreement: 0.70
    catastrophic_floor:      # the ONLY blocking condition for this gate
      min_grounded_rate: 0.50
      min_judge_agreement: 0.50
    threshold:
      min_grounded_rate: 0.70
      min_judge_agreement: 0.70

  verification:
    description: >
      Remediation-verification accuracy gate (SPEC-remediation-verification #15). Drives a labeled set of
      post-remediation states (probe state + indicator re-check) through decide_verdict and scores the
      verified/unverified/regressed classification. Deterministic / provider-independent (no LLM on the
      default path). Extends — does not duplicate — the temporal-memory gate (verification fact
      time-validity) and the redaction gate (verification record + dashboard view).
    required: true
    threshold:
      min_accuracy: 0.95
      max_false_verified_rate: 0.0
    fixtures:
      - verified_clean_indicator
      - regressed_indicator_still_malicious
      - regressed_probe_unexpected
      - unverified_intel_unknown
      - unverified_probe_inconclusive
      - conflict_probe_ok_indicator_malicious
      - multi_action_worst_case

  feedback:
    description: >
      Feedback-effectiveness gate (SPEC-memory-feedback-loop #16). Deterministic / provider-independent.
      Proves a 2nd occurrence of a known-failed indicator escalates sooner / picks a stronger playbook than
      the baseline, and that verified/superseded priors apply no change. Extends temporal_memory (outcome-fact
      time-validity) and supervisor_routing (prior-regressed-escalates); redaction covers the outcome fact + KPI.
    required: true
    threshold:
      pass_rate: 1.0
      fixtures:
        - prior_regressed_escalates
        - prior_unverified_escalates
        - prior_failure_picks_stronger_playbook
        - verified_prior_no_change
        - superseded_prior_no_change

  detection:
    description: >
      Detection precision/recall gate (SPEC-detector #14). Deterministic / provider-independent.
      Runs the labeled replay set through the rule/threshold detector and scores
      precision and recall over match/threshold scenarios. Extends the suite; does
      not duplicate existing gates. The detector has no LLM, so this gate is
      provider-independent.
    required: true
    threshold:
      precision_min: 0.90
      recall_min: 0.90

  anomaly_detection:
    description: >
      ML anomaly-detection precision/recall gate (SPEC-ml-anomaly-detector #17). Deterministic /
      provider-independent. Scores the committed Isolation Forest artifact over a labeled held-out
      set of per-entity windows (CERT-derived). Blocking: the gate scores the saved artifact, so it
      is deterministic with no runtime variance. Extends the suite; does not duplicate existing gates.
    required: true
    threshold:
      precision_min: 0.80
      recall_min: 0.80
      max_false_positive_rate: 0.10
