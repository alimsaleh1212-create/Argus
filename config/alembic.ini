[alembic]
# Run from the repo root: `alembic -c config/alembic.ini ...` (or `make migrate`).
script_location = backend/db/migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = %(SENTINEL__POSTGRES__DSN)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
