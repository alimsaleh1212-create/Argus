# Argus local stack.
#
# Backing services: postgres (pgvector), vault (dev mode), minio.
# Backend image (deploy/api/Dockerfile) runs as three containers:
#   - migrate  one-shot: applies Alembic migrations
#   - api      the FastAPI web server
#   - worker   (reserved — SPEC-ingestion #4)
#
# On `docker compose up` the stack self-configures:
#   vault-seed writes dev credentials into Vault, migrate runs schema migrations,
#   then api starts. No manual steps needed.
#
# User-provided API keys (LLM keys, threat-intel keys, etc.) go in .env.
# vault-seed picks them up and writes them to Vault so the API reads them from there.
# All other config is set via environment vars below — no .env needed for the API itself.
#
# Later specs add services by uncommenting the reserved block at the bottom.

services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "argus", "-d", "argus"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  vault:
    image: hashicorp/vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  neo4j:
    image: neo4j:5.26
    environment:
      NEO4J_AUTH: neo4j/dev-neo4j-password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # One-shot: seeds dev credentials and any user API keys from .env into Vault KV v2.
  # .env is optional — only needed when the user has real API keys to provide.
  vault-seed:
    image: hashicorp/vault
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    env_file:
      - path: .env
        required: false
    command: >
      sh -c "
        vault kv put secret/minio access_key=minioadmin secret_key=minioadmin &&
        vault kv put secret/llm api_key=$${GEMINI_API_KEY:-placeholder} &&
        vault kv put secret/ingest token=$${INGEST_WEBHOOK_TOKEN:-dev-webhook-token} &&
        vault kv put secret/memory username=neo4j password=dev-neo4j-password uri=bolt://neo4j:7687 &&
        vault kv put secret/dashboard password_hash=$${ARGUS_ADMIN_PASSWORD_HASH:-dev-hash-placeholder} salt=$${ARGUS_ADMIN_SALT:-dev-salt} iterations=$${ARGUS_ADMIN_ITERATIONS:-260000} jwt_secret=$${ARGUS_JWT_SECRET:-dev-jwt-secret-change-in-production} &&
        if [ -n \"$${INTEL_API_KEY:-}\" ]; then vault kv put secret/intel api_key=$${INTEL_API_KEY}; fi
      "
    restart: on-failure

  # Local Ollama runtime — the secondary/fallback LLM provider (SPEC-llm-provider #3).
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # One-shot: pull the tiny pinned model so the fallback path, integration tier,
  # and both-providers eval are real and the stack comes up clean from a fresh clone.
  ollama-pull:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen2:0.5b"]
    restart: on-failure

  # One-shot: applies Alembic schema migrations before the API starts.
  migrate:
    build:
      context: .
      dockerfile: deploy/api/Dockerfile
    image: argus-backend:local
    environment:
      ARGUS__POSTGRES__DSN: postgresql+asyncpg://argus:argus@postgres:5432/argus
    command: ["alembic", "-c", "config/alembic.ini", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: deploy/api/Dockerfile
    image: argus-backend:local
    ports:
      - "8000:8000"
    environment:
      ARGUS__VAULT__ADDR: http://vault:8200
      ARGUS__VAULT__TOKEN: dev-root-token
      ARGUS__VAULT__REQUIRED_PATHS: '["secret/minio","secret/llm","secret/ingest","secret/dashboard"]'
      ARGUS__POSTGRES__DSN: postgresql+asyncpg://argus:argus@postgres:5432/argus
      ARGUS__MINIO__ENDPOINT_URL: http://minio:9000
      ARGUS__LLM__OLLAMA_BASE_URL: http://ollama:11434
      ARGUS__REDIS__URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault-seed:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      ollama-pull:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  worker:
    build:
      context: .
      dockerfile: deploy/api/Dockerfile
    image: argus-backend:local
    command: ["python", "-m", "backend.worker"]
    environment:
      ARGUS__VAULT__ADDR: http://vault:8200
      ARGUS__VAULT__TOKEN: dev-root-token
      ARGUS__VAULT__REQUIRED_PATHS: '["secret/minio","secret/llm","secret/ingest","secret/memory"]'
      ARGUS__POSTGRES__DSN: postgresql+asyncpg://argus:argus@postgres:5432/argus
      ARGUS__MINIO__ENDPOINT_URL: http://minio:9000
      ARGUS__LLM__OLLAMA_BASE_URL: http://ollama:11434
      ARGUS__REDIS__URL: redis://redis:6379/0
      ARGUS__MEMORY__NEO4J_URI: bolt://neo4j:7687
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      vault-seed:
        condition: service_completed_successfully
    restart: on-failure

  # One-shot: seeds the reference corpus (MITRE techniques + runbooks) and IOC reputation facts.
  # api/worker do NOT depend on it — knowledge is additive; the spine boots without a seeded corpus.
  seed-corpus:
    image: argus-backend:local
    command: ["python", "-m", "backend.seed_corpus"]
    environment:
      ARGUS__POSTGRES__DSN: postgresql+asyncpg://argus:argus@postgres:5432/argus
      ARGUS__VAULT__ADDR: http://vault:8200
      ARGUS__VAULT__TOKEN: dev-root-token
      ARGUS__VAULT__REQUIRED_PATHS: '["secret/memory"]'
      ARGUS__MEMORY__NEO4J_URI: bolt://neo4j:7687
    depends_on:
      migrate:
        condition: service_completed_successfully
      neo4j:
        condition: service_healthy
      vault-seed:
        condition: service_completed_successfully
    restart: on-failure

  # SPEC-dashboard (#12) — React SPA served by nginx, same-origin reverse-proxy to api
  frontend:
    build:
      context: .
      dockerfile: deploy/frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

  # ── Reserved — uncomment when the owning spec is implemented ──────────────────
  #
  # guardrails:                          # SPEC-safety (#11) — self-hosted sidecar only
  #   build:
  #     context: .
  #     dockerfile: deploy/guardrails/Dockerfile

volumes:
  postgres_data:
  minio_data:
  ollama_data:
  neo4j_data:
