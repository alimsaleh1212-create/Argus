# Sentinel local stack.
#
# Backing services: postgres (pgvector), vault (dev mode), minio.
# Backend image (deploy/api/Dockerfile) runs as three containers:
#   - migrate  one-shot: applies Alembic migrations
#   - api      the FastAPI web server
#   - worker   (reserved — SPEC-ingestion #4)
#
# On `docker compose up` the stack self-configures:
#   vault-seed writes dev credentials into Vault, migrate runs schema migrations,
#   then api starts. No manual steps needed.
#
# User-provided API keys (LLM keys, threat-intel keys, etc.) go in .env.
# vault-seed picks them up and writes them to Vault so the API reads them from there.
# All other config is set via environment vars below — no .env needed for the API itself.
#
# Later specs add services by uncommenting the reserved block at the bottom.

services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel
      POSTGRES_DB: sentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "sentinel", "-d", "sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  vault:
    image: hashicorp/vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # One-shot: seeds dev credentials and any user API keys from .env into Vault KV v2.
  # .env is optional — only needed when the user has real API keys to provide.
  vault-seed:
    image: hashicorp/vault
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    env_file:
      - path: .env
        required: false
    command: >
      sh -c "
        vault kv put secret/minio access_key=minioadmin secret_key=minioadmin &&
        vault kv put secret/llm api_key=$${GEMINI_API_KEY:-placeholder}
      "
    restart: on-failure

  # Local Ollama runtime — the secondary/fallback LLM provider (SPEC-llm-provider #3).
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # One-shot: pull the tiny pinned model so the fallback path, integration tier,
  # and both-providers eval are real and the stack comes up clean from a fresh clone.
  ollama-pull:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "qwen2:0.5b"]
    restart: on-failure

  # One-shot: applies Alembic schema migrations before the API starts.
  migrate:
    build:
      context: .
      dockerfile: deploy/api/Dockerfile
    image: sentinel-backend:local
    environment:
      SENTINEL__POSTGRES__DSN: postgresql+asyncpg://sentinel:sentinel@postgres:5432/sentinel
    command: ["alembic", "-c", "config/alembic.ini", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: deploy/api/Dockerfile
    image: sentinel-backend:local
    ports:
      - "8000:8000"
    environment:
      SENTINEL__VAULT__ADDR: http://vault:8200
      SENTINEL__VAULT__TOKEN: dev-root-token
      SENTINEL__VAULT__REQUIRED_PATHS: '["secret/minio","secret/llm"]'
      SENTINEL__POSTGRES__DSN: postgresql+asyncpg://sentinel:sentinel@postgres:5432/sentinel
      SENTINEL__MINIO__ENDPOINT_URL: http://minio:9000
      SENTINEL__LLM__OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      vault:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_healthy
      vault-seed:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      ollama-pull:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Reserved — uncomment when the owning spec is implemented ──────────────────
  #
  # worker:                              # SPEC-ingestion (#4) — queue consumer
  #   build:
  #     context: .
  #     dockerfile: deploy/api/Dockerfile
  #   image: sentinel-backend:local
  #   command: ["python", "-m", "backend.worker"]
  #   environment:
  #     SENTINEL__VAULT__ADDR: http://vault:8200
  #     SENTINEL__VAULT__TOKEN: dev-root-token
  #     SENTINEL__VAULT__REQUIRED_PATHS: '["secret/minio","secret/redis"]'
  #     SENTINEL__POSTGRES__DSN: postgresql+asyncpg://sentinel:sentinel@postgres:5432/sentinel
  #     SENTINEL__MINIO__ENDPOINT_URL: http://minio:9000
  #   depends_on:
  #     redis: { condition: service_healthy }
  #     migrate: { condition: service_completed_successfully }
  #
  # redis:                               # SPEC-ingestion (#4) — cache / queue / dedup
  #   image: redis:7
  #   ports:
  #     - "6379:6379"
  #   healthcheck:
  #     test: ["CMD", "redis-cli", "ping"]
  #     interval: 5s
  #     retries: 10
  #
  # neo4j:                               # SPEC-memory (#6) — Graphiti temporal memory
  #   image: neo4j:5
  #   ports:
  #     - "7474:7474"
  #     - "7687:7687"
  #
  # guardrails:                          # SPEC-safety (#11) — self-hosted sidecar only
  #   build:
  #     context: .
  #     dockerfile: deploy/guardrails/Dockerfile
  #
  # frontend:                            # SPEC-dashboard (#12) — React, separate image
  #   build:
  #     context: .
  #     dockerfile: deploy/frontend/Dockerfile

volumes:
  postgres_data:
  minio_data:
  ollama_data:
