# Argus local stack — self-configuring on `docker compose up`:
#   vault-seed writes secrets from .env into Vault (deploy/vault/seed.sh),
#   migrate applies schema migrations, then api/worker/frontend start.
#
# Secrets policy: the app reads secrets ONLY from Vault. .env (optional,
# git-ignored, see .env.example) is read solely by vault-seed.
# Connection defaults (postgres/vault/minio/redis/ollama/neo4j hostnames)
# live in backend/infra/config.py — services below set only deltas.

x-backend: &backend
  build:
    context: .
    dockerfile: deploy/api/Dockerfile
  image: argus-backend:local

services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: argus
      POSTGRES_PASSWORD: argus
      POSTGRES_DB: argus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "argus", "-d", "argus"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  vault:
    image: hashicorp/vault
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # One-shot: seeds Vault from .env — see deploy/vault/seed.sh.
  vault-seed:
    image: hashicorp/vault
    cap_add:
      - IPC_LOCK
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: dev-root-token
    env_file:
      - path: .env
        required: false
    volumes:
      - ./deploy/vault/seed.sh:/seed.sh:ro
    entrypoint: ["sh", "/seed.sh"]
    restart: on-failure

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  neo4j:
    image: neo4j:5.26
    environment:
      NEO4J_AUTH: neo4j/dev-neo4j-password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # Local Ollama runtime — the fallback LLM provider (SPEC-llm-provider #3).
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # One-shot: pull the embedding model used by Graphiti memory (nomic-embed-text).
  # The LLM model (gemma4:31b-cloud) is cloud-hosted — no local pull needed.
  ollama-pull:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama", "pull", "nomic-embed-text"]
    restart: on-failure

  # One-shot: applies Alembic schema migrations before the API starts.
  migrate:
    <<: *backend
    command: ["alembic", "-c", "config/alembic.ini", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    <<: *backend
    ports:
      - "8000:8000"
    environment:
      ARGUS__VAULT__REQUIRED_PATHS: '["secret/minio","secret/llm","secret/ingest","secret/dashboard"]'
      # Presidio's AnalyzerEngine deadlocks at import inside the container
      # (futex wait); redaction falls back to the regex/secret scrubber.
      ARGUS__OBSERVABILITY__PRESIDIO_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_healthy
      redis:
        condition: service_healthy
      vault-seed:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
      ollama-pull:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  worker:
    <<: *backend
    command: ["python", "-m", "backend.worker"]
    environment:
      ARGUS__VAULT__REQUIRED_PATHS: '["secret/minio","secret/llm","secret/ingest","secret/memory"]'
      # Same Presidio in-container deadlock workaround as api.
      ARGUS__OBSERVABILITY__PRESIDIO_ENABLED: "false"
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      vault-seed:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  # One-shot: seeds the reference corpus (MITRE + runbooks) and IOC facts.
  # api/worker do NOT depend on it — the spine boots without a seeded corpus.
  seed-corpus:
    <<: *backend
    command: ["python", "-m", "backend.seed_corpus"]
    environment:
      ARGUS__VAULT__REQUIRED_PATHS: '["secret/memory"]'
    depends_on:
      neo4j:
        condition: service_healthy
      vault-seed:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    restart: on-failure

  # React SPA served by nginx, same-origin reverse-proxy to api (SPEC-dashboard #12).
  frontend:
    build:
      context: .
      dockerfile: deploy/frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

  # ── Reserved — uncomment when the owning spec is implemented ────────────────
  # guardrails:                          # SPEC-safety (#11) — self-hosted sidecar
  #   build:
  #     context: .
  #     dockerfile: deploy/guardrails/Dockerfile

volumes:
  postgres_data:
  minio_data:
  ollama_data:
  neo4j_data:
