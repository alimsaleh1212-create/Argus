server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Combined with the $upstream_api variable in each
    # proxy_pass below, this forces nginx to re-resolve the `api` hostname at
    # request time (every `valid=` window) instead of caching the IP once at
    # worker startup. Without this, recreating the api container (compose
    # --force-recreate, a crash-restart, etc.) gives it a NEW IP that nginx
    # never picks up — every /auth, /incidents, /approvals request then 502s
    # until nginx is manually reloaded. This was the recurring demo 502.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Reverse-proxy API paths to the backend service (same-origin, no CORS).
    location /auth {
        set $upstream_api api:8000;
        proxy_pass http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 90;
    }

    location /incidents {
        set $upstream_api api:8000;
        proxy_pass http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # SSE requires buffering disabled
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600;
    }

    location /approvals {
        set $upstream_api api:8000;
        proxy_pass http://$upstream_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 90;
    }

    # SPA fallback — all non-API routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check
    location /nginx-health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
