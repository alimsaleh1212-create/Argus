name: Eval Freeze (manual)

# NON-BLOCKING / MANUAL-ONLY.
#
# This freeze eval exercises provider-dependent quality gates (triage F1, the
# pinned rationale judge) that require real LLM credentials which are NOT
# available in CI:
#   - GEMINI_API_KEY secret           (Gemini provider + pinned rationale judge)
#   - Ollama cloud auth for the model  (the configured model is gemma4:31b-cloud,
#                                       a cloud-hosted model the local CI ollama
#                                       container cannot serve)
# plus a reachable MinIO for `--upload`.
#
# Without those, the provider-dependent gates report `incomplete` (exit 3) and
# the run goes red. To avoid perpetual red nightly/tag runs, the automatic
# triggers are disabled — run this manually via "Run workflow" once the
# credentials above are configured. The job is also marked continue-on-error so
# it can never block the pipeline.
on:
  workflow_dispatch:

jobs:
  eval-freeze:
    name: Freeze eval (both providers + MinIO report)
    runs-on: ubuntu-latest
    continue-on-error: true   # informational until provider creds are configured
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      # MinIO must be started via `docker run` (not a `services:` container): the
      # minio image needs the `server /data` command, which `services:` blocks
      # cannot pass, so as a service it just prints usage and exits unhealthy.
      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data --console-address ":9001"
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/minio/health/live && break
            sleep 2
          done
      - name: Pull Ollama model
        run: |
          curl -s -X POST http://localhost:11434/api/pull \
            -d '{"name":"gemma4:2b"}' || true
        continue-on-error: true
      - name: Run freeze eval (both providers + MinIO upload)
        env:
          ARGUS__LLM__GEMINI_VAULT_PATH: ""
          ARGUS__LLM__OLLAMA_BASE_URL: http://localhost:11434
          ARGUS__LLM__OLLAMA_MODEL: gemma4:2b
          ARGUS__MINIO__ENDPOINT_URL: http://localhost:9000
          ARGUS__EVAL__REPORT_BUCKET: eval-reports
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          uv run python -m backend.eval \
            --mode freeze \
            --providers gemini,ollama \
            --upload
      - name: Upload eval report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report-${{ github.sha }}
          path: eval_report.json
          if-no-files-found: ignore
