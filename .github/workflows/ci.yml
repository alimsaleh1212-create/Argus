name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint & import contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check backend/ tests/
      - run: uv run ruff format --check backend/ tests/
      - run: uv run lint-imports

  # ── Tiered tests ────────────────────────────────────────────────────────────
  # Each tier runs on its OWN fresh runner, so memory is isolated and the heavy
  # testcontainers tier never competes with the fast tier. Coverage data from
  # each tier is uploaded, then merged in the `coverage` gate below.

  test-unit:
    name: Unit (fast, no Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - name: Run unit tier
        run: COVERAGE_FILE=.coverage.unit uv run pytest tests/unit --cov=backend --cov-report= -q
      - uses: actions/upload-artifact@v4
        with:
          name: cov-unit
          path: .coverage.unit
          include-hidden-files: true

  test-integration:
    name: Integration (testcontainers)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - name: Run integration tier
        run: COVERAGE_FILE=.coverage.integration uv run pytest tests/integration --cov=backend --cov-report= -q
      - uses: actions/upload-artifact@v4
        with:
          name: cov-integration
          path: .coverage.integration
          include-hidden-files: true

  test-e2e:
    name: E2E in-process (no Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - name: Run in-process e2e tier (excludes compose-only tests)
        run: COVERAGE_FILE=.coverage.e2e uv run pytest tests/e2e -m "not needs_compose" --cov=backend --cov-report= -q
      - uses: actions/upload-artifact@v4
        with:
          name: cov-e2e
          path: .coverage.e2e
          include-hidden-files: true

  coverage:
    name: Coverage gate (≥80%)
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration, test-e2e, eval]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - uses: actions/download-artifact@v4
        with:
          name: cov-unit
          path: .
      - uses: actions/download-artifact@v4
        with:
          name: cov-integration
          path: .
      - uses: actions/download-artifact@v4
        with:
          name: cov-e2e
          path: .
      - uses: actions/download-artifact@v4
        with:
          name: cov-eval
          path: .
      - name: Combine + enforce gate
        run: |
          uv run coverage combine .coverage.unit .coverage.integration .coverage.e2e .coverage.eval
          uv run coverage report --fail-under=80

  # ── Eval gate (required) ────────────────────────────────────────────────────
  # Runs every declared gate in its own subprocess (memory-safe, mirrors
  # run-tests.sh). Uses Ollama only (fork-safe: no cloud key needed).
  # A required-gate regression or orphan/stale mismatch fails the build.
  # Target: ≤ ~6 min added to per-PR CI (deterministic gates are fast;
  # Ollama LLM gates depend on model availability in the runner).
  #
  # Fallback knob: if Ollama gates prove flaky in CI infra, promote them to
  # reported-only in eval_thresholds.yaml (keep deterministic set blocking).
  eval:
    name: Eval gates (per-PR, Ollama only)
    runs-on: ubuntu-latest
    needs: [lint]
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - name: Pull Ollama model
        run: |
          curl -sf http://localhost:11434/api/version || true
          curl -s -X POST http://localhost:11434/api/pull \
            -d '{"name":"gemma4:2b"}' || true
        continue-on-error: true
      - name: Run eval suite (memory-safe, one gate per subprocess)
        env:
          ARGUS__LLM__OLLAMA_BASE_URL: http://localhost:11434
          ARGUS__LLM__OLLAMA_MODEL: gemma4:2b
        run: COV=1 scripts/run-evals.sh --mode per_pr
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cov-eval
          path: .coverage.eval
          include-hidden-files: true

  smoke:
    name: E2E smoke (compose up → /ready)
    runs-on: ubuntu-latest
    needs: [lint, coverage]
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: |
          cp .env.example .env
          docker compose up -d --wait --timeout 120
      - name: Assert readiness
        run: |
          # --wait only guarantees container healthchecks (api = /health liveness);
          # /ready probes all deps, so poll it with a window.
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/ready; then
              echo "✓ /ready returned 200"; exit 0
            fi
            echo "waiting for /ready ($i/30)…"; sleep 2
          done
          echo "::error::/ready never returned 200 — final body + api logs:"
          curl -s http://localhost:8000/ready || true
          docker compose logs api --tail 80 || true
          exit 1
      - name: Tear down
        if: always()
        run: docker compose down -v
