name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint & import contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check backend/ tests/
      - run: uv run ruff format --check backend/ tests/
      - run: uv run lint-imports

  test:
    name: Unit + integration (coverage ≥80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run pytest tests/unit tests/integration --cov=backend --cov-fail-under=80 -q

  smoke:
    name: E2E smoke (compose up → /ready)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: |
          cp .env.example .env
          docker compose up -d --wait --timeout 120
      - name: Assert readiness
        run: curl -fsS http://localhost:8000/ready
      - name: Tear down
        if: always()
        run: docker compose down -v
